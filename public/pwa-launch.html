<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#17232d">
    <title>FitAppCE</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/fitapp/img/pwa-icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/fitapp/img/pwa-icon-192.png">
    <style>
        *{box-sizing:border-box}
        html,body{width:100%;height:100%;margin:0;background:#17232d}
        body{
            overflow:hidden;
            background-image:url('/fitapp/img/pwa-splash-mobile.png');
            background-position:center;
            background-size:cover;
            background-repeat:no-repeat;
        }
        .launch-progress{
            position:fixed;
            left:50%;
            bottom:max(34px,calc(env(safe-area-inset-bottom) + 22px));
            width:min(150px,38vw);
            height:3px;
            overflow:hidden;
            transform:translateX(-50%);
            border-radius:3px;
            background:rgba(255,255,255,.18);
        }
        .launch-progress::after{
            content:"";
            display:block;
            width:42%;
            height:100%;
            border-radius:inherit;
            background:#f3bd42;
            animation:loading 1.15s ease-in-out infinite;
        }
        @keyframes loading{
            from{transform:translateX(-110%)}
            to{transform:translateX(340%)}
        }
        @media (orientation:landscape) and (min-width:700px){
            body{background-image:url('/fitapp/img/pwa-splash-desktop.png')}
        }
        @media (prefers-reduced-motion:reduce){
            .launch-progress::after{animation:none;width:100%}
        }
    </style>
</head>
<body>
    <div class="launch-progress" role="progressbar" aria-label="Abriendo FitAppCE"></div>
    <script>
        window.setTimeout(function () {
            window.location.replace('/fitapp/rutina');
        }, 1600);
    </script>
</body>
</html>
